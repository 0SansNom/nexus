<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - AI Assistant Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <nav class="sidebar">
            <div class="logo">
                <span class="logo-icon">◈</span>
                <span class="logo-text">NEXUS</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" data-page="activity">
                    <span class="nav-icon">◉</span>
                    <span>Activity</span>
                </li>
                <li class="nav-item" data-page="objectives">
                    <span class="nav-icon">◎</span>
                    <span>Objectives</span>
                </li>
                <li class="nav-item" data-page="validations">
                    <span class="nav-icon">◇</span>
                    <span>Validations</span>
                    <span class="badge" id="validation-count" style="display: none;">0</span>
                </li>
                <li class="nav-item" data-page="memory">
                    <span class="nav-icon">◆</span>
                    <span>Memory</span>
                </li>
            </ul>
            <div class="connection-status" id="connection-status">
                <span class="status-dot disconnected"></span>
                <span>Disconnected</span>
            </div>
        </nav>

        <main class="content">
            <!-- Activity Page -->
            <section class="page active" id="page-activity">
                <header class="page-header">
                    <h1>Activity Feed</h1>
                </header>
                <div class="activity-feed" id="activity-feed">
                    <div class="empty-state">No activity yet</div>
                </div>
            </section>

            <!-- Objectives Page -->
            <section class="page" id="page-objectives">
                <header class="page-header">
                    <h1>Objectives</h1>
                    <button class="btn btn-primary" onclick="showObjectiveModal()">+ New Objective</button>
                </header>
                <div class="objectives-list" id="objectives-list">
                    <div class="empty-state">No objectives yet</div>
                </div>
            </section>

            <!-- Validations Page -->
            <section class="page" id="page-validations">
                <header class="page-header">
                    <h1>Pending Validations</h1>
                </header>
                <div class="validations-list" id="validations-list">
                    <div class="empty-state">No pending validations</div>
                </div>
            </section>

            <!-- Memory Page -->
            <section class="page" id="page-memory">
                <header class="page-header">
                    <h1>User Memory</h1>
                    <button class="btn btn-primary" onclick="showMemoryModal()">+ Add Memory</button>
                </header>
                <div class="memory-list" id="memory-list">
                    <div class="empty-state">No memory entries</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Objective Modal -->
    <div class="modal" id="objective-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>New Objective</h2>
                <button class="modal-close" onclick="closeModal('objective-modal')">&times;</button>
            </div>
            <form id="objective-form" onsubmit="submitObjective(event)">
                <div class="form-group">
                    <label for="obj-title">Title</label>
                    <input type="text" id="obj-title" required placeholder="What should be accomplished?">
                </div>
                <div class="form-group">
                    <label for="obj-description">Description</label>
                    <textarea id="obj-description" rows="3" placeholder="Detailed description..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="obj-agent">Agent Type</label>
                        <select id="obj-agent" required>
                            <option value="email_agent">Email Agent</option>
                            <option value="calendar_agent">Calendar Agent</option>
                            <option value="memory_agent">Memory Agent</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="obj-priority">Priority</label>
                        <select id="obj-priority">
                            <option value="0">Normal</option>
                            <option value="1">High</option>
                            <option value="2">Critical</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="obj-schedule">Schedule (cron, optional)</label>
                    <input type="text" id="obj-schedule" placeholder="0 9 * * * (every day at 9am)">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('objective-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Memory Modal -->
    <div class="modal" id="memory-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Memory</h2>
                <button class="modal-close" onclick="closeModal('memory-modal')">&times;</button>
            </div>
            <form id="memory-form" onsubmit="submitMemory(event)">
                <div class="form-group">
                    <label for="mem-key">Key</label>
                    <input type="text" id="mem-key" required placeholder="unique_key">
                </div>
                <div class="form-group">
                    <label for="mem-value">Value</label>
                    <textarea id="mem-value" rows="3" required placeholder="Value to remember..."></textarea>
                </div>
                <div class="form-group">
                    <label for="mem-category">Category (optional)</label>
                    <input type="text" id="mem-category" placeholder="preferences, contacts, etc.">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('memory-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
